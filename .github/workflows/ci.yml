name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download face-api models
        run: |
          npm ci
          npm run download-models

      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t nuvopic:ci .
