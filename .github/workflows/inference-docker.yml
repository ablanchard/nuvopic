name: Build & Push Inference Image

on:
  # Manual trigger — use this for the first build
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "modal/core.py"
      - "modal/server.py"
      - "modal/Dockerfile"
      - ".github/workflows/inference-docker.yml"

jobs:
  build-and-push:
    name: Build & Push nuvopic-inference
    runs-on: ubuntu-latest
    # The image is ~15 GB; give it plenty of time
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # GitHub runners have ~14 GB free by default; we need more for this build
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: modal/Dockerfile
          push: true
          tags: |
            bobmoriss/nuvopic-inference:latest
            bobmoriss/nuvopic-inference:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
