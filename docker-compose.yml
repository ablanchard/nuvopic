version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nuvopic
      POSTGRES_PASSWORD: nuvopic
      POSTGRES_DB: nuvopic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuvopic"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Webhook notification target for auto-processing
      MINIO_NOTIFY_WEBHOOK_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_PRIMARY: "http://host.docker.internal:8080/webhook/s3"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create default bucket and configure S3 event notifications
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/photos --ignore-existing;
      mc anonymous set download myminio/photos;
      mc event add myminio/photos arn:minio:sqs::PRIMARY:webhook --event put --suffix .jpg;
      mc event add myminio/photos arn:minio:sqs::PRIMARY:webhook --event put --suffix .jpeg;
      mc event add myminio/photos arn:minio:sqs::PRIMARY:webhook --event put --suffix .png;
      mc event add myminio/photos arn:minio:sqs::PRIMARY:webhook --event put --suffix .heic;
      mc event add myminio/photos arn:minio:sqs::PRIMARY:webhook --event put --suffix .webp;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
