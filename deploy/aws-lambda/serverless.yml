service: nuvopic

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'us-east-1'}
  memorySize: 2048
  timeout: 300
  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    S3_ENDPOINT: ${env:S3_ENDPOINT, ''}
    S3_BUCKET: ${env:S3_BUCKET}
    S3_ACCESS_KEY_ID: ${env:S3_ACCESS_KEY_ID}
    S3_SECRET_ACCESS_KEY: ${env:S3_SECRET_ACCESS_KEY}
    S3_REGION: ${env:S3_REGION, 'us-east-1'}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${env:S3_BUCKET}/*

functions:
  processPhoto:
    handler: dist/index.handler
    events:
      # S3 trigger for automatic processing
      - s3:
          bucket: ${env:S3_BUCKET}
          event: s3:ObjectCreated:*
          rules:
            - suffix: .jpg
      - s3:
          bucket: ${env:S3_BUCKET}
          event: s3:ObjectCreated:*
          rules:
            - suffix: .jpeg
      - s3:
          bucket: ${env:S3_BUCKET}
          event: s3:ObjectCreated:*
          rules:
            - suffix: .png
      - s3:
          bucket: ${env:S3_BUCKET}
          event: s3:ObjectCreated:*
          rules:
            - suffix: .heic
      - s3:
          bucket: ${env:S3_BUCKET}
          event: s3:ObjectCreated:*
          rules:
            - suffix: .webp
      # HTTP endpoint for direct invocation
      - http:
          path: process
          method: post
          cors: true

package:
  patterns:
    - "!**/*"
    - "dist/**"
    - "models/**"
    - "node_modules/**"
    - "package.json"

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
